<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bircan Client Dashboard</title><style>body{margin:0;font-family:Inter,Arial,sans-serif;background:#f6f8fc;color:#10213f}.top{background:#fff;border-bottom:1px solid #e5ebf5;padding:18px 28px;display:flex;justify-content:space-between;align-items:center}.brand{color:#06265f;font-weight:900}.wrap{max-width:1100px;margin:32px auto;padding:0 20px}.card{background:#fff;border:1px solid #e5ebf5;border-radius:26px;padding:26px;box-shadow:0 18px 45px rgba(6,38,95,.08)}button,a.btn{display:inline-block;background:#06265f;color:#fff;border:0;border-radius:14px;padding:12px 16px;font-weight:800;text-decoration:none}.step{padding:16px;border:1px solid #e5ebf5;border-radius:18px;margin:12px 0;background:#fbfdff}.ok{color:#0b6b38;font-weight:900}</style></head><body><div class="top"><div class="brand">Bircan Migration & Education</div><a href="https://bircanmigration.com.au">Main website</a></div><main class="wrap"><section class="card"><h1>Your secure client dashboard</h1><p>This dashboard displays your assessment, payment status and written PDF advice letter.</p><input id="submissionId" placeholder="Submission ID" style="width:100%;padding:14px;border:1px solid #e5ebf5;border-radius:14px"><button onclick="load()">Load assessment</button><div id="out"></div></section></main><script>const q=new URLSearchParams(location.search);if(q.get('submissionId'))submissionId.value=q.get('submissionId');async function load(){const id=submissionId.value.trim();if(!id)return;const r=await fetch('/api/assessments/'+id+'/status');const j=await r.json();if(!j.ok){out.innerHTML='<p>Assessment not found.</p>';return}const s=j.submission;out.innerHTML=`<div class="step"><b>Assessment received</b><br>${s.type||''} ${s.subclass||''}</div><div class="step"><b>Payment</b><br>${s.payment?.status||'Pending/manual'}</div><div class="step"><b>Advice status</b><br><span class="ok">${s.status||'processing'}</span></div>${s.status==='completed'?`<p><a class="btn" href="/api/assessments/${s.id}/download">Download written advice PDF</a></p>`:'<p>Your written assessment is being prepared. Please check again shortly.</p>'}`}</script></body></html>
